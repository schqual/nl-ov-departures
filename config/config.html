<!DOCTYPE html>
<!--
  NL OV Departures — configuration screen

  This file is the readable source of truth for the config UI. Pebble
  config screens are opened as an external URL in the phone's browser,
  which normally means hosting this somewhere public. To avoid needing
  a host, the PebbleKit JS companion (src/pkjs/index.js) embeds an
  equivalent template string and opens it as a `data:text/html,...`
  URI instead — so if you edit the UI, mirror the change in the
  CONFIG_HTML template in index.js too (see comment there).

  On "Save", this page builds a JSON payload of favourite stops and
  returns it to the watch app via:
    location.href = "pebblejs://close#" + encodeURIComponent(JSON.stringify(payload))
-->
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NL OV Departures — Settings</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; padding: 16px; background: #f4f4f4; }
    h1 { font-size: 18px; }
    .stop { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .stop label { display: block; font-size: 12px; color: #666; margin-top: 8px; }
    .stop input { width: 100%; box-sizing: border-box; padding: 6px; font-size: 14px; }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; }
    button { padding: 10px 16px; font-size: 14px; border-radius: 6px; border: none; margin-top: 8px; }
    .btn-primary { background: #0060ff; color: #fff; width: 100%; }
    .btn-secondary { background: #ddd; }
    .btn-danger { background: #ffe0e0; color: #a00; }
    #add-stop-btn { width: 100%; }
  </style>
</head>
<body>
  <h1>Favourite stops</h1>
  <p>Add the stops you want NL OV Departures to consider. On each
     refresh the watch app picks the 1-3 nearest to your phone and
     shows the soonest 5 departures across them.</p>

  <div id="stops"></div>

  <button id="add-stop-btn" class="btn-secondary">+ Add stop</button>
  <button id="save-btn" class="btn-primary">Save</button>

  <script>
    // Stop shape: { name, tpc, lat, lon }
    // tpc = OVapi TimingPointCode, e.g. "30001410" for a bus stop.
    // Multiple TPCs per physical stop (e.g. both directions) can be
    // comma-separated in the tpc field.
    var stops = [];

    try {
      var query = window.location.search.substring(1);
      var params = {};
      query.split('&').forEach(function (part) {
        var item = part.split('=');
        if (item.length === 2) {
          params[item[0]] = decodeURIComponent(item[1]);
        }
      });
    
      if (params.stops) {
        stops = JSON.parse(params.stops);
      }
    } catch (e) {
      stops = [];
    }

    function render() {
      var container = document.getElementById('stops');
      container.innerHTML = '';
      stops.forEach(function (stop, i) {
        var div = document.createElement('div');
        div.className = 'stop';
        div.innerHTML =
          '<label>Name</label>' +
          '<input data-i="' + i + '" data-field="name" value="' + (stop.name || '') + '">' +
          '<label>OVapi TimingPointCode(s), comma-separated</label>' +
          '<input data-i="' + i + '" data-field="tpc" value="' + (stop.tpc || '') + '">' +
          '<div class="row">' +
            '<div style="flex:1">' +
              '<label>Latitude</label>' +
              '<input data-i="' + i + '" data-field="lat" value="' + (stop.lat != null ? stop.lat : '') + '">' +
            '</div>' +
            '<div style="flex:1">' +
              '<label>Longitude</label>' +
              '<input data-i="' + i + '" data-field="lon" value="' + (stop.lon != null ? stop.lon : '') + '">' +
            '</div>' +
          '</div>' +
          '<button class="btn-secondary use-gps-btn" data-i="' + i + '">Use current GPS location</button> ' +
          '<button class="btn-danger remove-btn" data-i="' + i + '">Remove</button>';
        container.appendChild(div);
      });

      container.querySelectorAll('input').forEach(function (input) {
        input.addEventListener('input', function () {
          var i = parseInt(input.getAttribute('data-i'), 10);
          var field = input.getAttribute('data-field');
          stops[i][field] = input.value;
        });
      });

      container.querySelectorAll('.remove-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var i = parseInt(btn.getAttribute('data-i'), 10);
          stops.splice(i, 1);
          render();
        });
      });

      container.querySelectorAll('.use-gps-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var i = parseInt(btn.getAttribute('data-i'), 10);
          btn.textContent = 'Locating...';
          if (!navigator.geolocation) {
            alert('Geolocation not available in this browser context. Enter lat/lon manually.');
            btn.textContent = 'Use current GPS location';
            return;
          }
          navigator.geolocation.getCurrentPosition(
            function (pos) {
              stops[i].lat = pos.coords.latitude;
              stops[i].lon = pos.coords.longitude;
              render();
            },
            function (err) {
              alert('Could not get location (' + err.message + '). Enter lat/lon manually.');
              btn.textContent = 'Use current GPS location';
            },
            { enableHighAccuracy: true, timeout: 10000 }
          );
        });
      });
    }

    document.getElementById('add-stop-btn').addEventListener('click', function () {
      stops.push({ name: '', tpc: '', lat: '', lon: '' });
      render();
    });

    document.getElementById('save-btn').addEventListener('click', function () {
      var cleaned = stops
        .filter(function (s) { return s.name && s.tpc && s.lat !== '' && s.lon !== ''; })
        .map(function (s) {
          return {
            name: s.name,
            tpc: s.tpc,
            lat: parseFloat(s.lat),
            lon: parseFloat(s.lon)
          };
        });
      var payload = { stops: cleaned };
      var returnTo = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(payload));
      windows.location = returnTo;
    });

    render();
  </script>
</body>
</html>
